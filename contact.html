    <main>
      <h1>Fale conosco</h1>
      <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
      <hr />
      <form action="/" method="post">
        <fieldset>
          <legend><strong>Dados de contato</strong></legend>
          <label for="name">Nome:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="João"
            required
          /><br />
          <label for="email">E-email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="exemplo@exemplo.com"
            required
          />
        </fieldset>
        <fieldset>
          <legend><strong>Mensagem:</strong></legend>
          <textarea name="msg" id="msg"></textarea>
        </fieldset>
        <fieldset>
          <button class="btn" type="submit">Enviar mensagem</button>
          <button class="btn" type="reset">Limpar o formulário</button>
        </fieldset>
      </form>
    </main>
